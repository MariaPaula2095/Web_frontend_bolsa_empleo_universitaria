<div class="p-8">
  <div class="mb-6">
    <h1 class="text-2xl font-bold text-gray-900">Perfil de empresa</h1>
    <p class="text-gray-500 text-sm mt-1">Actualiza la información de tu empresa</p>
  </div>

  @if (cargando) {
    <div class="flex justify-center py-16">
      <div class="w-8 h-8 border-4 border-blue-800 border-t-transparent rounded-full animate-spin"></div>
    </div>
  }

  @if (!cargando) {
    <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-8 max-w-2xl">

      @if (mensaje) {
        <div class="mb-6 p-4 rounded-lg text-sm {{ esError ? 'bg-red-50 border border-red-200 text-red-700' : 'bg-green-50 border border-green-200 text-green-700' }}">
          {{ mensaje }}
        </div>
      }

      <!-- Foto de empresa -->
      <div class="flex flex-col items-center mb-8">
        <input type="file" id="inputFoto" accept="image/*" class="hidden" (change)="onFotoSeleccionada($event)">
        <label for="inputFoto" class="cursor-pointer group">
          <div class="relative w-24 h-24">
            @if (fotoUrl) {
              <img [src]="fotoUrl" alt="Logo empresa"
                class="w-24 h-24 rounded-full object-cover border-4 border-blue-100 group-hover:border-blue-400 transition-colors">
            } @else {
              <div class="w-24 h-24 rounded-full bg-blue-100 border-4 border-blue-100 group-hover:border-blue-400 transition-colors flex items-center justify-center text-blue-800 text-3xl font-bold">
                {{ iniciales }}
              </div>
            }
            <div class="absolute inset-0 rounded-full bg-black bg-opacity-0 group-hover:bg-opacity-20 transition-all flex items-center justify-center">
              @if (subiendoFoto) {
                <div class="w-6 h-6 border-2 border-white border-t-transparent rounded-full animate-spin"></div>
              }
            </div>
          </div>
          <p class="text-sm text-blue-700 font-medium mt-2 text-center group-hover:underline">
            {{ tieneFoto ? 'Cambiar logo' : 'Subir logo' }}
          </p>
        </label>
      </div>

      <!-- Formulario datos -->
      <form [formGroup]="form" (ngSubmit)="guardar()">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Nombre de la empresa</label>
            <input formControlName="nombre" type="text" placeholder="Mi Empresa S.A.S"
              class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Sector</label>
            <input formControlName="sector" type="text" placeholder="Tecnología"
              class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Ciudad</label>
            <input formControlName="ciudad" type="text" placeholder="Bogotá"
              class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Teléfono</label>
            <input formControlName="telefono" type="tel" placeholder="3001234567"
              class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
          </div>
        </div>

        <div class="mb-8">
          <label class="block text-sm font-medium text-gray-700 mb-1">Descripción</label>
          <textarea formControlName="descripcion" rows="3" placeholder="Describe tu empresa, su misión y lo que ofrece..."
            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm resize-none"></textarea>
        </div>

        <button type="submit" [disabled]="guardando"
          class="px-6 py-3 bg-blue-800 text-white rounded-lg font-semibold hover:bg-blue-900 transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
          {{ guardando ? 'Guardando...' : 'Actualizar perfil' }}
        </button>
      </form>

      <!-- Documento NIT -->
      <div class="mt-8 pt-8 border-t border-gray-100">
        <h2 class="text-base font-semibold text-gray-900 mb-1">Documento NIT</h2>
        <p class="text-gray-400 text-sm mb-4">Sube el RUT o NIT de tu empresa en formato PDF</p>

        @if (mensajeDoc) {
          <div class="mb-4 p-3 rounded-lg text-sm {{ mensajeDoc.includes('Error') ? 'bg-red-50 border border-red-200 text-red-700' : 'bg-green-50 border border-green-200 text-green-700' }}">
            {{ mensajeDoc }}
          </div>
        }

        <div class="flex items-center gap-4 flex-wrap">
          @if (tieneDocumento) {
            <div class="flex items-center gap-2 px-4 py-2 bg-green-50 border border-green-200 rounded-lg">
              <svg class="w-5 h-5 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
              </svg>
              <span class="text-green-700 text-sm font-medium">{{ nombreDocumento }}</span>
            </div>
            <button type="button" (click)="verDocumento()"
              class="px-4 py-2 text-blue-700 border border-blue-300 rounded-lg text-sm font-medium hover:bg-blue-50 transition-colors">
              Ver documento
            </button>
          }

          <label for="inputDoc" class="cursor-pointer px-4 py-2 border border-gray-300 rounded-lg text-sm font-medium text-gray-700 hover:bg-gray-50 transition-colors flex items-center gap-2">
            @if (subiendoDoc) {
              <div class="w-4 h-4 border-2 border-gray-400 border-t-transparent rounded-full animate-spin"></div>
              Subiendo...
            } @else {
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/>
              </svg>
              {{ tieneDocumento ? 'Reemplazar documento' : 'Subir documento' }}
            }
          </label>
          <input type="file" id="inputDoc" accept="application/pdf" class="hidden" (change)="onDocumentoSeleccionado($event)">
        </div>
      </div>

    </div>
  }
</div>
