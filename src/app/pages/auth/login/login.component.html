<div class="min-h-screen bg-gradient-to-br from-blue-900 to-blue-700 flex items-center justify-center p-4">
  <div class="w-full max-w-md">

    <!-- Logo -->
    <div class="text-center mb-8">
      <div class="w-16 h-16 bg-white rounded-full flex items-center justify-center text-blue-800 font-bold text-2xl mx-auto mb-3 shadow-lg">BEU</div>
      <h1 class="text-white text-2xl font-bold">Bolsa de Empleo Universitario</h1>
      <p class="text-blue-200 text-sm mt-1">Inicia sesión en tu cuenta</p>
    </div>

    <div class="bg-white rounded-2xl shadow-2xl p-8">

      <!-- Tabs -->
      <div class="flex bg-gray-100 rounded-lg p-1 mb-6">
        <button (click)="seleccionar('estudiante')"
          class="flex-1 py-2 text-sm font-medium rounded-md transition-all {{ tipo === 'estudiante' ? 'bg-white text-blue-800 shadow-sm' : 'text-gray-500 hover:text-gray-700' }}">
          Estudiante / Egresado
        </button>
        <button (click)="seleccionar('empresa')"
          class="flex-1 py-2 text-sm font-medium rounded-md transition-all {{ tipo === 'empresa' ? 'bg-white text-blue-800 shadow-sm' : 'text-gray-500 hover:text-gray-700' }}">
          Empresa
        </button>
      </div>

      <form [formGroup]="form" (ngSubmit)="login()">

        @if (error) {
          <div class="mb-4 p-3 bg-red-50 border border-red-200 rounded-lg text-red-700 text-sm">{{ error }}</div>
        }

        <div class="mb-4">
          <label class="block text-sm font-medium text-gray-700 mb-1">Correo electrónico</label>
          <input formControlName="email" type="email" placeholder="correo@ejemplo.com"
            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm transition-colors">
        </div>

        <div class="mb-6">
          <label class="block text-sm font-medium text-gray-700 mb-1">Contraseña</label>
          <div class="relative">
            <input formControlName="password" [type]="verPassword ? 'text' : 'password'" placeholder="••••••••"
              class="w-full px-4 py-3 pr-11 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm transition-colors">
            <button type="button" (click)="verPassword = !verPassword"
              class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
              @if (!verPassword) {
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                </svg>
              } @else {
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>
                </svg>
              }
            </button>
          </div>
        </div>

        <button type="submit" [disabled]="form.invalid || cargando"
          class="w-full py-3 bg-blue-800 text-white rounded-lg font-semibold hover:bg-blue-900 transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
          {{ cargando ? 'Iniciando sesión...' : 'Iniciar sesión' }}
        </button>
      </form>

      <div class="mt-6 text-center space-y-3">
        @if (tipo === 'estudiante') {
          <p class="text-sm text-gray-600">
            ¿No tienes cuenta? <a routerLink="/registro-estudiante" class="text-blue-700 font-medium hover:underline">Regístrate aquí</a>
          </p>
        }
        @if (tipo === 'empresa') {
          <p class="text-sm text-gray-600">
            ¿Tu empresa no está registrada? <a routerLink="/registro-empresa" class="text-blue-700 font-medium hover:underline">Solicita acceso</a>
          </p>
        }
        <a routerLink="/" class="text-sm text-gray-400 hover:text-gray-600 block">← Volver al inicio</a>
      </div>
    </div>
  </div>
</div>
