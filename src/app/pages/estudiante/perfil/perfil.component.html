<div class="p-8">
  <div class="mb-6">
    <h1 class="text-2xl font-bold text-gray-900">Mi perfil</h1>
    <p class="text-gray-500 text-sm mt-1">Completa tu información para que las empresas puedan conocerte</p>
  </div>

  @if (cargando) {
    <div class="flex justify-center py-16">
      <div class="w-8 h-8 border-4 border-blue-800 border-t-transparent rounded-full animate-spin"></div>
    </div>
  }

  @if (!cargando) {
    <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-8 max-w-2xl">

      @if (mensaje) {
        <div class="mb-6 p-4 rounded-lg text-sm {{ esError ? 'bg-red-50 border border-red-200 text-red-700' : 'bg-green-50 border border-green-200 text-green-700' }}">
          {{ mensaje }}
        </div>
      }

      <form [formGroup]="form" (ngSubmit)="guardar()">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Carrera</label>
            <input formControlName="carrera" type="text" placeholder="Ingeniería de Sistemas"
              class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Universidad</label>
            <input formControlName="universidad" type="text" placeholder="Universidad Nacional"
              class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Semestre</label>
            <input formControlName="semestre" type="number" placeholder="8"
              class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Disponibilidad</label>
            <select formControlName="disponibilidad"
              class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm bg-white">
              <option value="INMEDIATA">Inmediata</option>
              <option value="POR_DEFINIR">Por definir</option>
            </select>
          </div>
        </div>

        <div class="mb-6">
          <label class="block text-sm font-medium text-gray-700 mb-1">Habilidades</label>
          <textarea formControlName="habilidades" rows="3" placeholder="Java, Python, trabajo en equipo, comunicación..."
            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm resize-none"></textarea>
        </div>

        <div class="mb-6">
          <label class="block text-sm font-medium text-gray-700 mb-1">Experiencia</label>
          <textarea formControlName="experiencia" rows="3" placeholder="Describe tu experiencia laboral o proyectos académicos..."
            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm resize-none"></textarea>
        </div>

        <div class="mb-8">
          <label class="block text-sm font-medium text-gray-700 mb-1">URL del CV <span class="text-gray-400">(opcional)</span></label>
          <input formControlName="cvUrl" type="url" placeholder="https://drive.google.com/..."
            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
        </div>

        <button type="submit" [disabled]="guardando"
          class="px-6 py-3 bg-blue-800 text-white rounded-lg font-semibold hover:bg-blue-900 transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
          {{ guardando ? 'Guardando...' : (perfilExistente ? 'Actualizar perfil' : 'Guardar perfil') }}
        </button>
      </form>
    </div>
  }
</div>
